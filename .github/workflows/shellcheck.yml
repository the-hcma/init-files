name: shellcheck
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: shellcheck bootstrap_host
        run: shellcheck bootstrap_host
